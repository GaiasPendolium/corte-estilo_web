services:
  - type: web
    name: peluqueria-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn peluqueria_backend.wsgi --log-file -
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: peluqueria-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://tu-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://tu-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: peluqueria-postgres
          property: connectionString
      - key: QZ_ALLOWED_ORIGINS
        value: https://tu-frontend.vercel.app

databases:
  - name: peluqueria-postgres
    plan: free
    databaseName: peluqueria_db
    user: peluqueria_user
